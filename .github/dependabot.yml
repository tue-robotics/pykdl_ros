version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
  # ROS1
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: ros1
    schedule:
      interval: "daily"
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    target-branch: ros1
    schedule:
      interval: "weekly"
      day: "tuesday"
